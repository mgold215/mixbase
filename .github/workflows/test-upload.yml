name: Upload & Playback Tests

on:
  push:
    branches: [tst, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Railway deployment
        run: |
          echo "Polling for Railway deployment to go live..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://mixfolio-production.up.railway.app/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ App is live (attempt $i)"
              break
            fi
            echo "  attempt $i: HTTP $STATUS — waiting 15s..."
            sleep 15
          done

      - name: Run upload & playback tests
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/test-upload.mjs https://mixfolio-production.up.railway.app
