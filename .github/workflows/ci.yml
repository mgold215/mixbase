name: CI — Build, Lint, Security

on:
  push:
    branches: [main, tst]
  pull_request:
    branches: [main, tst]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks scans for passwords, API keys, tokens in the codebase
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Fail on high/critical vulnerabilities
      - run: npm audit --audit-level=high
        continue-on-error: true

      # Also run with the GitHub advisory database
      - name: Check for known vulnerabilities
        run: npx audit-ci --high
        continue-on-error: true
